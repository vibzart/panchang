    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 15            # Shukla Purnima
    aliases: [Kojagiri Purnima, Kumara Purnima]
    regions: [all]

  # ==========================================================================
  # KARTIK (Month 8) — Oct-Nov
  # ==========================================================================

  # NOTE on months: this file uses AMANT month numbers throughout. The
  # Diwali-cluster festivals below are popularly described as "Kartik
  # Krishna ..." — that is the PURNIMANT label; in amant terms the same
  # paksha belongs to Ashwin (month 7). They previously said month 8,
  # which resolved them a full month late (after Diwali).

  - id: karva_chauth
    name: Karva Chauth
    description: Married women's fasting for husband's long life
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 19            # Krishna Chaturthi (purnimant Kartik K4)
    regions: [north_india, punjab]
    # Vrat is kept while Chaturthi prevails through moonrise (evening) —
    # approximated by pradosha-vyapti, matching Drik Panchang.
    priority: vyapti
    kaala: pradosha

  - id: ahoi_ashtami
    name: Ahoi Ashtami
    description: Mothers' fasting for children's well-being
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 23            # Krishna Ashtami (purnimant Kartik K8)
    regions: [north_india]
    # Puja at dusk when stars appear — pradosha-vyapti rule.
    priority: vyapti
    kaala: pradosha

  - id: dhanteras
    name: Dhanteras
    description: Worship of Dhanvantari — buying gold and utensils
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 28            # Krishna Trayodashi (purnimant Kartik K13)
    aliases: [Dhantrayodashi, Dhanvantari Jayanti]
    regions: [all]
    # Observed on the day Trayodashi prevails at pradosha (Dharma Sindhu).
    priority: vyapti
    kaala: pradosha

  - id: narak_chaturdashi
    name: Narak Chaturdashi
    description: Krishna killed demon Narakasura — Choti Diwali
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 29            # Krishna Chaturdashi (purnimant Kartik K14)
    aliases: [Choti Diwali, Roop Chaturdashi]
    regions: [all]

  - id: diwali
    name: Diwali
    description: Festival of Lights — Lakshmi Puja
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 30            # Amavasya (last day of amant Ashwin)
    aliases: [Deepavali]
    regions: [all]
    # Lakshmi Puja is performed while Amavasya prevails at pradosha —
    # the day with pradosha-vyapti wins (Nirnaya Sindhu, Drik Panchang).
    priority: vyapti
    kaala: pradosha

  - id: govardhan_puja
    name: Govardhan Puja
    description: Krishna lifted Govardhan Hill — Annakut
    rule: tithi_at_sunrise
    lunar_month: 8
    tithi: 1             # Shukla Pratipada (day after Diwali, next month cycle)
    aliases: [Annakut, Bali Pratipada, Padwa]
    regions: [all]
    # NOTE: This is Kartik Shukla Pratipada. Since Diwali is Kartik Amavasya,
    # this naturally falls the day after. The tithi search near the Vrischika
