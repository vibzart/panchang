# Panchang Festival Definitions
#
# Festival specs for the Hindu calendar engine.
# Each festival is defined by its astronomical rule:
#   - tithi_at_sunrise: festival falls on the day when the specified tithi
#     prevails at sunrise in the specified lunar month
#   - sankranti: festival falls on the Gregorian date of a solar transit
#
# Tithi numbering: 1-15 = Shukla Paksha, 16-30 = Krishna Paksha
#   1=Pratipada, 2=Dvitiya, ..., 15=Purnima,
#   16=K.Pratipada, ..., 25=K.Dashami, 26=K.Ekadashi, ..., 29=K.Chaturdashi, 30=Amavasya
#
# Lunar month numbering: 1=Chaitra, 2=Vaishakha, 3=Jyeshtha, 4=Ashadha,
#   5=Shravana, 6=Bhadrapada, 7=Ashwin, 8=Kartik, 9=Margashirsha,
#   10=Pausha, 11=Magha, 12=Phalguna
#
# ⚠ Month numbers are AMANT (month = Amavasya→Amavasya). Popular North-Indian
#   names for Krishna-paksha festivals use the PURNIMANT label, which is one
#   month AHEAD for that paksha: "Kartik Krishna Chaturthi" (Karva Chauth) is
#   amant Ashwin (7), NOT Kartik (8). Getting this wrong shifts the festival
#   a full month (see tests/test_reference_2026.py, BUG-2).
#
# Optional observance fields (see calendar/_data.py):
#   priority:    paraviddha (default) | puurvaviddha | vyapti
#   kaala:       sunrise | praatah | sangava | madhyahna | aparahna |
#                saayaahna | poorvahna | pradosha | nishita | full_day
#   vyapti_tie:  para (default) | purva — tie-break when the tithi covers the
#                kaala on BOTH candidate days (Vijayadashami uses purva)
#   adhika_maasa: nija (default) | adhika | adhika_if_exists | adhika_and_nija
#
# Sankranti index (calendar-year order):
#   0=Makar, 1=Kumbha, 2=Meena, 3=Mesha, 4=Vrishabha, 5=Mithuna,
#   6=Karka, 7=Simha, 8=Kanya, 9=Tula, 10=Vrischika, 11=Dhanu
#
# Regions:
#   all          = Pan-Bhāratīya
#   north_india  = UP, MP, Rajasthan, Bihar, Jharkhand, etc.
#   south_india  = Karnataka, Andhra, Telangana, Tamil Nadu, Kerala
#   maharashtra  = Maharashtra
#   gujarat      = Gujarat
#   bengal       = West Bengal, Tripura, Assam (Bengali traditions)
#   punjab       = Punjab, Haryana
#   odisha       = Odisha
#   tamil_nadu   = Tamil Nadu
#   kerala       = Kerala
#   assam        = Assam

festivals:

  # ==========================================================================
  # SANKRANTI-BASED (Solar Transit) Festivals
  # ==========================================================================

  - id: makar_sankranti
    name: Makar Sankranti
    description: Sun enters Capricorn — harvest festival, kite flying
    rule: sankranti
    sankranti_index: 0
    aliases: [Magh Bihu, Uttarayan]
    regions: [all]

  - id: lohri
    name: Lohri
    description: Punjabi bonfire harvest festival — eve of Makar Sankranti
    rule: sankranti
    sankranti_index: 0
    day_offset: -1       # celebrated the day before Makara Sankranti
    regions: [punjab, north_india]

  - id: pongal
    name: Thai Pongal
    description: Tamil harvest thanksgiving — first day of Thai month
    rule: sankranti
    sankranti_index: 0   # Makara Sankranti day (Thai 1)
    aliases: [Thai Pongal, Makara Sankranti]
    regions: [tamil_nadu, south_india]

  - id: baisakhi
    name: Baisakhi
    description: Sun enters Aries — harvest festival, Sikh New Year
    rule: sankranti
    sankranti_index: 3
    aliases: [Vishu, Puthandu, Pohela Boishakh, Bihu]
    regions: [punjab]

  - id: vishu
    name: Vishu
    description: Sun enters Aries — Malayali New Year
    rule: sankranti
    sankranti_index: 3
    regions: [kerala]

  - id: puthandu
    name: Puthandu
    description: Sun enters Aries — Tamil New Year
    rule: sankranti
    sankranti_index: 3
    regions: [tamil_nadu]

  - id: pohela_boishakh
    name: Pohela Boishakh
    description: Sun enters Aries — Bengali New Year
    rule: sankranti
    sankranti_index: 3
    regions: [bengal]

  - id: bihu_rongali
    name: Rongali Bihu
    description: Sun enters Aries — Assamese New Year
    rule: sankranti
    sankranti_index: 3
    regions: [assam]

  - id: karka_sankranti
    name: Karka Sankranti
    description: Sun enters Cancer — Dakshinayana begins
    rule: sankranti
    sankranti_index: 6
    regions: [all]

  # ==========================================================================
  # PAUSHA (Month 10) — Dec-Jan
  # ==========================================================================

  - id: sakat_chauth
    name: Sakat Chauth
    description: Ganesh worship on Krishna Chaturthi of Pausha
    rule: tithi_at_sunrise
    lunar_month: 10
    tithi: 19            # Krishna Chaturthi
    regions: [north_india]

  # ==========================================================================
  # MAGHA (Month 11) — Jan-Feb
  # ==========================================================================

  - id: vasant_panchami
    name: Vasant Panchami
    description: Worship of Goddess Saraswati, onset of spring
    rule: tithi_at_sunrise
    lunar_month: 11
    tithi: 5             # Shukla Panchami
    aliases: [Saraswati Puja, Basant Panchami]
    regions: [all]

  - id: ratha_saptami
    name: Ratha Saptami
    description: Sun God's chariot turns northward
    rule: tithi_at_sunrise
    lunar_month: 11
    tithi: 7             # Shukla Saptami
    regions: [all]

  - id: bhishma_ashtami
    name: Bhishma Ashtami
    description: Bhishma Pitamah left his mortal body
    rule: tithi_at_sunrise
    lunar_month: 11
    tithi: 8             # Shukla Ashtami
    regions: [all]

  - id: maha_shivaratri
    name: Maha Shivaratri
    description: Great night of Lord Shiva
    rule: tithi_at_sunrise
    lunar_month: 11
    tithi: 29            # Krishna Chaturdashi
    regions: [all]
    # Shivaratri is the day whose NIGHT holds Chaturdashi — nishita-vyapti
    # (Dharma Sindhu; matches Drik Panchang, e.g. 2026-02-15 not 02-16).
    priority: vyapti
    kaala: nishita

  # ==========================================================================
  # PHALGUNA (Month 12) — Feb-Mar
  # ==========================================================================

  - id: holika_dahan
    name: Holika Dahan
    description: Burning of Holika on eve of Holi
    rule: tithi_at_sunrise
    lunar_month: 12
    tithi: 14            # Shukla Chaturdashi (night of Purnima eve)
    regions: [all]

  - id: holi
    name: Holi
    description: Festival of Colors — Phalguna Purnima
    rule: tithi_at_sunrise
    lunar_month: 12
    tithi: 15            # Shukla Purnima
    aliases: [Dhulandi, Rangwali Holi, Dol Jatra]
    regions: [all]

  # ==========================================================================
  # CHAITRA (Month 1) — Mar-Apr
  # ==========================================================================

  - id: ugadi
    name: Ugadi
    description: Lunar New Year (Andhra, Telangana, Karnataka)
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 1             # Shukla Pratipada
    aliases: [Yugadi]
    regions: [south_india]

  - id: gudi_padwa
    name: Gudi Padwa
    description: Lunar New Year (Maharashtra)
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 1             # Shukla Pratipada
    regions: [maharashtra]

  - id: cheti_chand
    name: Cheti Chand
    description: Sindhi New Year — birth of Jhulelal
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 1             # Shukla Pratipada
    regions: [all]

  - id: gauri_teej
    name: Gauri Teej
    description: Worship of Goddess Gauri
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 3             # Shukla Tritiya
    aliases: [Gangaur]
    regions: [rajasthan, north_india]

  - id: ram_navami
    name: Ram Navami
    description: Birth of Lord Rama
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 9             # Shukla Navami
    regions: [all]
    # Rama was born at midday — the day with madhyahna-vyapti wins
    # (Smarta convention; the ISKCON/Vaishnava date can differ by a day).
    priority: vyapti
    kaala: madhyahna

  - id: mahavir_jayanti
    name: Mahavir Jayanti
    description: Birth of Lord Mahavira (Jain tradition)
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 13            # Shukla Trayodashi
    regions: [all]

  - id: hanuman_jayanti
    name: Hanuman Jayanti
    description: Birth of Lord Hanuman
    rule: tithi_at_sunrise
    lunar_month: 1
    tithi: 15            # Shukla Purnima
    regions: [all]

  # ==========================================================================
  # VAISHAKHA (Month 2) — Apr-May
  # ==========================================================================

  - id: akshaya_tritiya
    name: Akshaya Tritiya
    description: Eternally auspicious day — new beginnings
    rule: tithi_at_sunrise
    lunar_month: 2
    tithi: 3             # Shukla Tritiya
    aliases: [Akha Teej]
    regions: [all]
    # Observance rule: Vyapti during Aparahna (classical dana-pradhan rule).
    # This matches Drik Panchang and the dominant popular convention. When
    # Tritiya prevails during the afternoon of the earlier day but not the
    # later day, the earlier day is observed — the "purvaviddha via aparahna-
    # vyapti" case. Otherwise, the later day (paraviddha / udayatithi) wins.
    priority: vyapti
    kaala: aparahna
    references:
      - Smriti Kaustubha p.109-110  # via adyatithi / Pandit Venkatesh
      - Nirnaya Sindhu (Kamalakara Bhatta)
      - Dharma Sindhu (Kashinatha Upadhyaya)
    # Shloka + presiding deity + Kadambini verse refs live in lilavati's
    # festival_metadata.yaml — the shastric/curated layer is a premium
    # concern, panchang stays a calendar primitive.

  - id: parashurama_jayanti
    name: Parashurama Jayanti
    description: Birth of Lord Parashurama (6th avatar of Vishnu)
    rule: tithi_at_sunrise
    lunar_month: 2
    tithi: 3             # Shukla Tritiya
    regions: [all]

  - id: buddha_purnima
    name: Buddha Purnima
    description: Birth of Gautama Buddha
    rule: tithi_at_sunrise
    lunar_month: 2
    tithi: 15            # Shukla Purnima
    aliases: [Vesak, Buddha Jayanti]
    regions: [all]

