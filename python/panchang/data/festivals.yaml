  - id: tulsi_vivah
    name: Tulsi Vivah
    description: Ceremonial marriage of Tulsi plant and Lord Vishnu
    rule: tithi_at_sunrise
    lunar_month: 8
    tithi: 11            # Shukla Ekadashi (Prabodhini)
    aliases: [Tulsi Marriage]
    regions: [all]

  - id: dev_deepawali
