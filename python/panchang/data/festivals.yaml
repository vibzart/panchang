    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 10            # Shukla Dashami
    aliases: [Vijayadashami]
    regions: [all]
    # Vijaya muhurta falls in the afternoon — aparahna-vyapti rule.
    # When Dashami covers aparahna on BOTH days, the earlier day wins
    # ("dinadvaye aparahna-vyaptau purva", Nirnaya Sindhu; matches Drik
    # Panchang, e.g. 2026-10-20 not 10-21).
    priority: vyapti
    kaala: aparahna
    vyapti_tie: purva

