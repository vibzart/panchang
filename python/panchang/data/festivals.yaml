    name: Ganga Dussehra
    description: Descent of Goddess Ganga to Earth
    rule: tithi_at_sunrise
    lunar_month: 3
    tithi: 10            # Shukla Dashami
    regions: [all]

  - id: vat_savitri
    name: Vat Savitri
    description: Married women's vrat — Savitri saved Satyavan
    rule: tithi_at_sunrise
    lunar_month: 3
    tithi: 30            # Amavasya
    aliases: [Vat Purnima]
    regions: [maharashtra, gujarat, north_india]

  # ==========================================================================
  # ASHADHA (Month 4) — Jun-Jul
  # ==========================================================================

  - id: jagannath_rath_yatra
    name: Jagannath Rath Yatra
    description: Chariot festival of Lord Jagannath in Puri
    rule: tithi_at_sunrise
    lunar_month: 4
    tithi: 2             # Shukla Dvitiya
    regions: [odisha, all]

  - id: guru_purnima
    name: Guru Purnima
    description: Honoring the Guru — Vyasa Purnima
    rule: tithi_at_sunrise
    lunar_month: 4
    tithi: 15            # Shukla Purnima
    aliases: [Vyasa Purnima]
    regions: [all]

  # ==========================================================================
  # SHRAVANA (Month 5) — Jul-Aug
  # ==========================================================================

  - id: nag_panchami
    name: Nag Panchami
    description: Worship of serpent deities
    rule: tithi_at_sunrise
    lunar_month: 5
    tithi: 5             # Shukla Panchami
    regions: [all]

  - id: hariyali_teej
    name: Hariyali Teej
    description: Celebration of the monsoon — Goddess Parvati
    rule: tithi_at_sunrise
    lunar_month: 5
    tithi: 3             # Shukla Tritiya
    aliases: [Sawan Teej]
    regions: [north_india, rajasthan]

  - id: raksha_bandhan
    name: Raksha Bandhan
    description: Bond of protection between siblings
    rule: tithi_at_sunrise
    lunar_month: 5
    tithi: 15            # Shukla Purnima
    aliases: [Rakhi]
    regions: [all]

  # ==========================================================================
  # BHADRAPADA (Month 6) — Aug-Sep
  # ==========================================================================

  - id: kajari_teej
    name: Kajari Teej
    description: Third Teej — celebration of monsoon and marital bliss
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 3             # Shukla Tritiya
    aliases: [Badi Teej]
    regions: [north_india]

  - id: hartalika_teej
    name: Hartalika Teej
    description: Goddess Parvati's penance for Lord Shiva
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 3             # Shukla Tritiya
    regions: [north_india, maharashtra]

  - id: ganesh_chaturthi
    name: Ganesh Chaturthi
    description: Birth of Lord Ganesha
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 4             # Shukla Chaturthi
    aliases: [Vinayaka Chaturthi]
    regions: [all]
    # Ganesha puja is performed at midday — madhyahna-vyapti rule
    # (matches Drik Panchang, e.g. 2026-09-14 not 09-15).
    priority: vyapti
    kaala: madhyahna

  - id: rishi_panchami
    name: Rishi Panchami
    description: Honoring the Saptarishis (seven sages)
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 5             # Shukla Panchami
    regions: [all]

  - id: radha_ashtami
    name: Radha Ashtami
    description: Birth of Radha
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 8             # Shukla Ashtami
    regions: [north_india]

  - id: anant_chaturdashi
    name: Anant Chaturdashi
    description: Ganesh Visarjan — immersion of Ganesh idols
    rule: tithi_at_sunrise
    lunar_month: 6
    tithi: 14            # Shukla Chaturdashi
    regions: [all]

  - id: onam
    name: Onam (Thiruvonam)
    description: Harvest festival of Kerala — return of King Mahabali
    rule: nakshatra_at_sunrise
    nakshatra: 22         # Shravana (Thiruvonam)
    sankranti_index: 7    # Simha Sankranti (~Aug 17) — anchors to Chingam month
    regions: [kerala]

  - id: janmashtami
    name: Janmashtami
    description: Birth of Lord Krishna — Shravana Krishna Ashtami
    rule: tithi_at_sunrise
    lunar_month: 5       # Shravana (per shloka: मासि तु श्रावणेऽष्टम्यां)
    tithi: 23            # Krishna Ashtami
    aliases: [Krishna Janmashtami, Gokulashtami]
    regions: [all]
    # NOTE: North Indian Purnimant tradition calls this "Bhadrapada Krishna
    # Ashtami" because Shravana's Krishna Paksha falls in Purnimant-Bhadrapada.
    # The Amant month is Shravana. Source: Brahma Vaivarta Purana; adyatithi.
    # Krishna was born at midnight — the day whose nishita holds Ashtami
    # wins (Smarta convention; e.g. 2027-08-24, not 08-25).
    priority: vyapti
    kaala: nishita

  # ==========================================================================
  # ASHWIN (Month 7) — Sep-Oct
  # ==========================================================================

  - id: navaratri_start
    name: Sharad Navaratri
    description: Nine nights of Goddess Durga
    rule: tithi_at_sunrise
    lunar_month: 7
    tithi: 1             # Shukla Pratipada
    duration_days: 9
    aliases: [Durga Puja begins]
    regions: [all]

  - id: durga_ashtami
