  - id: bhai_dooj
    name: Bhai Dooj
    description: Brother-sister bond, Yama Dvitiya
    rule: tithi_at_sunrise
    lunar_month: 8
    tithi: 2             # Shukla Dvitiya
    aliases: [Bhai Tika, Bhai Bij, Yama Dvitiya]
    regions: [all]

  - id: chhath_puja
    name: Chhath Puja
    description: Sun worship at dawn and dusk — 4-day festival
    rule: tithi_at_sunrise
    lunar_month: 8
    tithi: 6             # Shukla Shashthi (main day)
    regions: [north_india]
    # NOTE: Chhath spans 4 days (Chaturthi to Saptami).
