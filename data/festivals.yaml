# Lilavati Festival Definitions
#
# Festival specs for the Hindu calendar engine.
# Each festival is defined by its astronomical rule:
#   - tithi_at_sunrise: festival falls on the day when the specified tithi
#     prevails at sunrise in the specified lunar month
#   - sankranti: festival falls on the Gregorian date of a solar transit
#
# Tithi numbering: 1-15 = Shukla Paksha, 16-30 = Krishna Paksha
#   1=Pratipada, 2=Dvitiya, ..., 15=Purnima,
#   16=K.Pratipada, ..., 25=K.Dashami, 26=K.Ekadashi, ..., 29=K.Chaturdashi, 30=Amavasya
#
# Lunar month numbering: 1=Chaitra, 2=Vaishakha, 3=Jyeshtha, 4=Ashadha,
#   5=Shravana, 6=Bhadrapada, 7=Ashwin, 8=Kartik, 9=Margashirsha,
#   10=Pausha, 11=Magha, 12=Phalguna
#
# Sankranti index (calendar-year order):
#   0=Makar, 1=Kumbha, 2=Meena, 3=Mesha, 4=Vrishabha, 5=Mithuna,
#   6=Karka, 7=Simha, 8=Kanya, 9=Tula, 10=Vrischika, 11=Dhanu
#
# Regions:
#   all          = Pan-Bhāratīya
#   north_india  = UP, MP, Rajasthan, Bihar, Jharkhand, etc.
#   south_india  = Karnataka, Andhra, Telangana, Tamil Nadu, Kerala
#   maharashtra  = Maharashtra
#   gujarat      = Gujarat
#   bengal       = West Bengal, Tripura, Assam (Bengali traditions)
#   punjab       = Punjab, Haryana
#   odisha       = Odisha
#   tamil_nadu   = Tamil Nadu
#   kerala       = Kerala
#   assam        = Assam

festivals:

  # ==========================================================================
  # SANKRANTI-BASED (Solar Transit) Festivals
  # ==========================================================================

  - id: makar_sankranti
    name: Makar Sankranti
    description: Sun enters Capricorn — harvest festival, kite flying
    rule: sankranti
    sankranti_index: 0
    aliases: [Pongal, Lohri, Magh Bihu, Uttarayan]
    regions: [all]

  - id: baisakhi
    name: Baisakhi
