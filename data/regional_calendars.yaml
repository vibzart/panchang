# Lilavati Regional Calendar Definitions
#
# Each regional calendar defines:
#   - type: "lunar" (month boundaries at Amavasya/Purnima) or "solar" (months at Sankranti)
#   - system: "amant" or "purnimant" (only for lunar type)
#   - months: regional names mapped to standard month number or rashi index
#   - era: how to compute the regional year from Gregorian year
#   - new_year: which event marks the start of the regional year
#
# Month mapping:
#   For lunar calendars: number = standard lunar month (1=Chaitra ... 12=Phalguna)
#   For solar calendars: rashi_index = zodiac sign the Sun enters (0=Mesha ... 11=Meena)
#
# Era types:
#   - offset: regional_year = gregorian_year + offset (applied after new_year check)
#   - sixty_year_cycle: 60-year Jovian cycle with named years

calendars:

  # ============================================================================
  # NORTH INDIA — Purnimant lunar calendars
  # ============================================================================

  - id: hindi
    name: Hindi Panchang
    language: Hindi
    type: lunar
    system: purnimant
    new_year:
      type: tithi
      lunar_month: 1    # Chaitra
      tithi: 1           # Shukla Pratipada
    era:
      name: Vikram Samvat
      type: offset
      # VS year starts at Chaitra Shukla Pratipada
      # For dates before Chaitra S1: VS = CE + 57
      # For dates on/after Chaitra S1: VS = CE + 57
      # (the +57 applies to the full Chaitra-to-Phalguna year)
      offset: 57
    months:
      - { number: 1,  name: Chaitra }
      - { number: 2,  name: Vaishakh }
      - { number: 3,  name: Jyeshth }
      - { number: 4,  name: Ashadh }
      - { number: 5,  name: Shravan }
      - { number: 6,  name: Bhadrapad }
      - { number: 7,  name: Ashwin }
      - { number: 8,  name: Kartik }
      - { number: 9,  name: Margashirsh }
      - { number: 10, name: Paush }
      - { number: 11, name: Magh }
      - { number: 12, name: Phalgun }

  # ============================================================================
  # GUJARAT — Amant lunar, Kartik new year
  # ============================================================================

  - id: gujarati
    name: Gujarati Panchang
    language: Gujarati
    type: lunar
    system: amant
    new_year:
      type: tithi
      lunar_month: 8    # Kartik
      tithi: 1           # Shukla Pratipada (day after Diwali)
    era:
      name: Vikram Samvat
      type: offset
      offset: 57
    months:
      - { number: 8,  name: Kartik }
      - { number: 9,  name: Magshar }
      - { number: 10, name: Posh }
      - { number: 11, name: Maha }
      - { number: 12, name: Fagan }
      - { number: 1,  name: Chaitra }
      - { number: 2,  name: Vaishakh }
      - { number: 3,  name: Jeth }
      - { number: 4,  name: Ashadh }
      - { number: 5,  name: Shravan }
      - { number: 6,  name: Bhadarvo }
      - { number: 7,  name: Aso }

